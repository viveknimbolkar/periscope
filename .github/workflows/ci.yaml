name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: Backend lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  backend-test:
    name: Backend test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./...

      # govulncheck — Go vulnerability scanner. Only flags vulns
      # actually present in the call graph (lower noise than
      # generic dep scanners). Report-only: continue-on-error so
      # findings show in the run UI but do not fail the build.
      - name: Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
        continue-on-error: true

  web:
    name: Web (lint, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error
          retention-days: 7

  helm-lint:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
        with:
          version: latest
      - run: helm lint deploy/helm/periscope
      # Render the chart with default values + a couple of common
      # overrides to catch template/schema drift that `helm lint`
      # alone misses.
      - run: helm template deploy/helm/periscope > /dev/null
      - run: helm template deploy/helm/periscope --set watchStreams.kinds=off > /dev/null
      - run: helm template deploy/helm/periscope --set audit.enabled=true > /dev/null

  build-embed:
    name: Build embedded binary
    runs-on: ubuntu-latest
    needs: [backend-test, web]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: internal/spa/dist
      - run: go build -tags embed -trimpath -o bin/periscope ./cmd/periscope
      - uses: actions/upload-artifact@v7
        with:
          name: periscope-binary
          path: bin/periscope
          if-no-files-found: error
          retention-days: 7
