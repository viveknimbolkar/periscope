apiVersion: v2
name: periscope-agent
description: |
  Periscope agent — runs on a managed K8s cluster, dials out to the
  central Periscope server over a long-lived WebSocket. Lets the
  server reach this cluster's apiserver without IAM, kubeconfig, or
  EKS Access Entry — just outbound HTTPS.
type: application
# Both fields track the central server version. Server N is
# compatible with agent N and N-1 (documented in the server's
# CHANGELOG).
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - kubernetes
  - multi-cluster
  - periscope
  - agent
  - dashboard
home: https://github.com/gnana997/periscope
sources:
  - https://github.com/gnana997/periscope
maintainers:
  - name: gnana997
    url: https://github.com/gnana997
annotations:
  # Artifact Hub renders these on the chart's listing page. See
  # https://artifacthub.io/docs/topics/annotations/helm/ for the full
  # key list.
  artifacthub.io/license: Apache-2.0
  artifacthub.io/operator: "false"
  artifacthub.io/links: |
    - name: Onboarding guide
      url: https://github.com/gnana997/periscope/blob/main/docs/setup/agent-onboarding.md
    - name: Source code
      url: https://github.com/gnana997/periscope
    - name: Central server chart
      url: https://artifacthub.io/packages/helm/periscope/periscope
    - name: Examples
      url: https://github.com/gnana997/periscope/tree/main/examples/agent
  # Per-release "What changed" rendered by Artifact Hub. The release
  # workflow can sync these from PR titles since the previous tag
  # (matches the server chart's convention).
  artifacthub.io/changes: |
    - kind: changed
      description: "Tracks server v1.0.3 — no agent-side protocol or compatibility changes (server N is compatible with agent N and N-1, unchanged)"
  # Cosign keyless signing (Sigstore). Same signing identity as the
  # server chart — the release workflow signs both in one run. Verify
  # via: cosign verify-blob ... --certificate-oidc-issuer=https://token.actions.githubusercontent.com
  artifacthub.io/signKey: |
    fingerprint: keyless
    url: https://token.actions.githubusercontent.com
