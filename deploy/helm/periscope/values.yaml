# Periscope — default values.
#
# See docs/setup/deploy.md for the walkthrough and docs/setup/{auth0,okta}.md
# for filling in the .auth.oidc block per IdP.

# -----------------------------------------------------------------------------
# Image
# -----------------------------------------------------------------------------
image:
  repository: ghcr.io/gnana997/periscope
  # Defaults to .Chart.AppVersion if empty.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# Single-replica is the supported v1 topology — the in-memory session
# store is per-replica. HA support lands in v1.x.
replicaCount: 1

# -----------------------------------------------------------------------------
# Service account
# -----------------------------------------------------------------------------
serviceAccount:
  create: true
  # If empty, a name is derived from the release name.
  name: ""
  # IRSA path: set the role-arn annotation here.
  # annotations:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::111111111111:role/periscope-base
  annotations: {}

# Pod Identity path (preferred for new EKS deployments). When true, no
# IRSA annotation is rendered on the SA — you create the association
# out-of-band:
#
#   aws eks create-pod-identity-association \
#     --cluster-name <hosting-cluster> \
#     --namespace <release-namespace> \
#     --service-account <sa-name> \
#     --role-arn arn:aws:iam::111111111111:role/periscope-base
podIdentity:
  enabled: false

# -----------------------------------------------------------------------------
# Auth (OIDC) — written verbatim into a ConfigMap as auth.yaml.
# -----------------------------------------------------------------------------
# Paste the contents of examples/config/auth.yaml.{auth0,okta} here
# (without the top-level YAML doc separators) and fill in your tenant
# specifics. The clientSecret should reference one of the secret modes
# below (default: ${OIDC_CLIENT_SECRET} env var, sourced from the
# Secret you bring or the chart renders).
auth:
  oidc:
    issuer: ""
    clientID: ""
    # When secrets.mode is one of [existing|plain|external], leave this
    # as ${OIDC_CLIENT_SECRET}. When secrets.mode=native, set this
    # directly to e.g. aws-secretsmanager://periscope/oidc#client_secret.
    clientSecret: ${OIDC_CLIENT_SECRET}
    redirectURL: ""
    scopes: [openid, profile, email, offline_access]
    # Set for Auth0 if you registered an API; empty for Okta and most
    # other IdPs.
    audience: ""
    postLogoutRedirect: ""

  session:
    cookieName: periscope_session
    idleTimeout: 30m
    absoluteTimeout: 8h
    # cookieDomain: ""

  authorization:
    # K8s authorization mode: shared (default) | tier | raw.
    # See RFC 0002 4 and docs/setup/cluster-rbac.md for the comparison.
    mode: shared

    # tier-mode only — map IdP groups to one of: read / triage / write / maintain / admin.
    # Reuse existing IdP groups; you don't need to create periscope-named ones.
    groupTiers: {}
    #  SRE-Platform:        admin
    #  SRE-OnCall:          triage
    #  Backend-TeamLeads:   maintain
    #  Engineering-All:     write
    #  Contractors:         read

    # tier-mode only — applied when a user matches no listed group.
    # "" = deny (the user cannot access the platform).
    defaultTier: ""

    # raw-mode only — prefix prepended to each impersonated group.
    groupPrefix: "periscope:"

    # IdP token claim that holds the groups list.
    # Auth0 needs a namespaced custom claim like https://periscope/groups.
    # Okta exposes "groups" natively.
    groupsClaim: groups

    # Gate (all modes): empty list = any authenticated user is allowed.
    allowedGroups: []

    # IdP groups granted full /api/audit visibility — see who-did-what
    # across all users. Independent of authz mode (works in shared, tier,
    # and raw). When empty, audit-admin falls back to mode-specific
    # defaults; see docs/setup/audit.md for the full resolution order.
    #
    # Typical use:
    #   auditAdminGroups: [SRE-Platform, Sec-Team]
    auditAdminGroups: []
  dev:
    subject: dev@local
    email: dev@local
    groups: [dev]

# -----------------------------------------------------------------------------
# Clusters registry — written verbatim into a ConfigMap as clusters.yaml.
# See examples/config/clusters.yaml for a fuller example with multiple
# backends.
#
# Per-cluster `exec:` overrides
# -----------------------------
# Any cluster entry MAY override the global pod-exec defaults (set under
# the top-level .exec block) on a field-by-field basis. Omitted fields
# fall through to the global default — partial overrides are fine.
#
# Example with overrides:
#   - name: prod-eu-west-1
#     backend: eks
#     region: eu-west-1
#     arn: arn:aws:eks:eu-west-1:222222222222:cluster/prod-eu-west-1
#     exec:
#       # Long-running prod debugging: 30-min idle timeout, beefier caps.
#       serverIdleSeconds: 1800
#       maxSessionsPerUser: 10
#       maxSessionsTotal: 100
#
#   - name: locked-down
#     backend: eks
#     region: us-west-2
#     arn: arn:aws:eks:us-west-2:333333333333:cluster/locked
#     exec:
#       # Disable interactive shell entirely on this cluster.
#       enabled: false
# -----------------------------------------------------------------------------
clusters: []
#
# Three backends supported:
#
# 1. eks — managed EKS clusters reached via IRSA / Pod Identity. The
#    "default" backend (omit `backend:` to get this).
# - name: prod-eu-west-1
#   backend: eks
#   region: eu-west-1
#   arn: arn:aws:eks:eu-west-1:222222222222:cluster/prod-eu-west-1
#
# 2. kubeconfig — non-EKS clusters reached via a kubeconfig file at a
#    path on the pod's filesystem. Useful for static credentials or
#    cross-provider clusters.
# - name: gke-staging
#   backend: kubeconfig
#   kubeconfigPath: /etc/periscope/gke-kubeconfig.yaml
#   kubeconfigContext: staging
#
# 3. in-cluster — the cluster periscope is itself running in. Uses the
#    in-pod ServiceAccount token (rest.InClusterConfig). The chart's
#    cluster-rbac.yaml automatically binds the periscope SA to the
#    impersonator role when this backend is in the registry. The most
#    common single-cluster install pattern.
# - name: in-cluster
#   backend: in-cluster

# -----------------------------------------------------------------------------
# Secrets — how the OIDC client secret reaches the pod.
#
# Pick one mode:
#   existing  Recommended default. You apply the Secret out-of-band; the
#             chart references it.
#   plain     Quick start / demo. The chart renders a kind: Secret with
#             stringData from values. Secret value lives in your values
#             file — fine for kind/minikube, never for prod.
#   external  External Secrets Operator. The chart renders an
#             ExternalSecret pointing at your SecretStore /
#             ClusterSecretStore. ESO syncs the value into a K8s Secret
#             that the Deployment then references.
#   native    No K8s Secret at all. Periscope's resolver fetches from
#             AWS Secrets Manager / SSM at startup using Pod Identity /
#             IRSA. Set .auth.oidc.clientSecret to e.g.
#             aws-secretsmanager://periscope/oidc#client_secret.
# -----------------------------------------------------------------------------
secrets:
  mode: existing

  existing:
    # Name of the pre-applied Secret. The Deployment mounts the value
    # at the env-var name `key`.
    name: periscope-oidc
    key: OIDC_CLIENT_SECRET

  plain:
    # Raw client secret. Used only when mode=plain.
    clientSecret: ""

  external:
    # External Secrets Operator (https://external-secrets.io). Renders
    # an ExternalSecret of api version external-secrets.io/v1.
    storeName: ""
    storeKind: ClusterSecretStore   # or SecretStore
    refreshInterval: 1h
    # The remote secret's path/name in the upstream store (e.g. the
    # Secrets Manager secret ID, or the SSM parameter name).
    remoteKey: ""
    # Optional: when the remote value is JSON-shaped, the JSON key to
    # extract. Leave empty for a raw scalar.
    remoteProperty: ""

  native:
    # No fields. Just point .auth.oidc.clientSecret at an
    # aws-secretsmanager:// or aws-ssm:// URL.
    enabled: true

# -----------------------------------------------------------------------------
# Extra env (rarely needed)
# -----------------------------------------------------------------------------
env: []

# -----------------------------------------------------------------------------
# Service
# -----------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 8080

# -----------------------------------------------------------------------------
# Ingress
# -----------------------------------------------------------------------------
ingress:
  enabled: false
  className: ""
  annotations: {}
  host: ""
  path: /
  pathType: Prefix
  tls:
    enabled: false
    secretName: ""

# -----------------------------------------------------------------------------
# Pod / container specs
# -----------------------------------------------------------------------------
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

nodeSelector: {}
tolerations: []
affinity: {}

# -----------------------------------------------------------------------------
# Audit log persistence
#
# Periscope always emits structured JSON audit records to stdout (one
# line per privileged action: pod exec, secret reveal, resource
# apply/delete, cronjob trigger). When .audit.enabled is true, the
# same events are also persisted to a local SQLite database the SPA
# (and operators) can query through GET /api/audit.
#
# v1 topology is single-replica, so the local DB is consistent with
# the in-memory session store. If/when HA support lands, treat this
# DB as a per-pod cache and forward stdout to a shared SIEM.
#
# Sizing: the schema is one row per event, ~1 KiB on disk including
# indexes. A busy production cluster might emit 5–10k events/day, so
# 30 days at 1 GiB is comfortable headroom. The vacuum loop prunes
# whichever cap (time or size) hits first.
#
# Compliance-grade retention (1 year, 7 years, etc.) is out of scope
# for SQLite — forward stdout to S3 / Loki / your SIEM and treat the
# local DB as a queryable cache.
#
# How the size caps interact:
#   .audit.maxSizeMB         → application-level cap. The vacuum
#                              loop prunes oldest rows when the DB
#                              exceeds this and runs VACUUM to
#                              reclaim pages back to the OS.
#   emptyDir.sizeLimit       → kubelet hard ceiling, only when
#                              storage.type=emptyDir. Auto-derived
#                              as 2 × maxSizeMB so the kubelet can't
#                              evict the pod before the application
#                              has a chance to prune (VACUUM
#                              transiently doubles disk usage by
#                              rewriting the DB to a temp file).
#   .audit.storage.size      → PVC request size, only when
#                              storage.type=pvc. Independent of
#                              maxSizeMB because PVC sizing is
#                              coupled to your StorageClass minimums
#                              and isn't node-local. Default 5Gi
#                              gives plenty of headroom over a 1Gi
#                              app cap.
# -----------------------------------------------------------------------------
audit:
  enabled: false

  # Time-based retention. Rows older than this are pruned on each
  # vacuum tick. Set to 0 to disable time-based pruning (size cap
  # still applies). Setting BOTH this and maxSizeMB to 0 is the
  # unbounded-growth footgun — the startup validator will warn.
  retentionDays: 30

  # Application-level on-disk cap. Oldest rows are pruned in 10%
  # batches when the file exceeds this. Set to 0 to disable
  # size-based pruning. In emptyDir mode this also drives the
  # kubelet sizeLimit (rendered as 2 × maxSizeMB).
  maxSizeMB: 1024

  # How often the prune+VACUUM loop runs. Accepts Go duration syntax
  # ("24h", "6h", "30m"). Shorter intervals reclaim disk faster and
  # smooth out transient peaks; longer intervals reduce CPU and IO.
  # Configurable here so high-volume environments can tune it down
  # to e.g. 6h without a code change.
  vacuumInterval: 24h

  storage:
    # pvc      → PersistentVolumeClaim, survives pod restarts.
    #            Recommended for any environment where the audit
    #            trail matters (i.e. anywhere you have audit on).
    # emptyDir → ephemeral; logs vanish on pod restart. The kubelet
    #            sizeLimit is auto-derived from maxSizeMB so the
    #            volume can't outgrow the application cap. Useful
    #            for kind/minikube smoke testing or when
    #            stdout-shipping to a SIEM is the system of record.
    type: pvc

    # PVC request size. Used only when type=pvc. Default 5Gi gives
    # plenty of headroom over the default 1Gi maxSizeMB; lower it
    # only if your StorageClass has a smaller minimum.
    size: 5Gi
    # Empty = use the cluster's default StorageClass. ReadWriteOnce
    # is sufficient for the v1 single-replica topology.
    storageClass: ""
    accessMode: ReadWriteOnce

# -----------------------------------------------------------------------------
# Pod exec (interactive shell into containers)
#
# Periscope ships pod exec on by default. The route is registered for
# every cluster in the registry; a user clicking "Open Shell" upgrades
# to a WebSocket and the binary streams stdin/stdout/stderr from the
# kube-apiserver under the user's impersonated identity.
#
# These are GLOBAL DEFAULTS — applied to every cluster's sessions
# unless a cluster entry overrides them in clusters[].exec (see the
# clusters: section above).
#
# There is intentionally no global `exec.enabled` switch. Disabling
# exec is a per-cluster decision: set `clusters[<i>].exec.enabled:
# false` to opt a specific cluster out (the UI hides the action and
# the API returns 403 / E_EXEC_DISABLED). To turn exec off everywhere,
# set it false on every cluster entry — typically a sign the feature
# is the wrong fit for your deployment.
#
# See docs/setup/pod-exec.md for the operator guide (caps, transports,
# circuit breaker, troubleshooting) and RFC 0001 for the design.
# -----------------------------------------------------------------------------
exec:
  # Server-side idle timeout. No stdin/stdout activity for this long
  # tears the session down. The browser shows a 30-second warning
  # banner before the cut. Bump for clusters where long-running
  # debugging is normal (e.g. prod incident response → 1800s).
  serverIdleSeconds: 600

  # How long before the server idle cut the browser is warned.
  # Subtracted from the idle deadline, so users can keep the session
  # alive by typing.
  idleWarnSeconds: 30

  # WebSocket heartbeat interval. Sends a ping frame every N seconds
  # to keep intermediate proxies (ingress, NLB, CloudFront) from
  # silently dropping idle sockets.
  heartbeatSeconds: 20

  # Concurrent exec sessions per OIDC subject, across all clusters
  # they have access to. Hit the cap → HTTP 429 with the active
  # sessions in the response body. Per-cluster overrides win.
  maxSessionsPerUser: 5

  # Concurrent exec sessions per cluster, total across all users.
  # Soft ceiling that protects the apiserver and the Periscope pod's
  # memory — each session pins ~1 MiB of buffers. Per-cluster
  # overrides win.
  maxSessionsTotal: 50

  # When true, Periscope pre-warms each cluster's IAM credentials and
  # exec policy at boot. Off by default; turn on when first-exec
  # latency on cold clusters is a UX problem (typically ~3-5s the
  # first time a cluster is touched after a restart).
  probeClustersOnBoot: false

# -----------------------------------------------------------------------------
# Watch streams (SSE push for live resource lists)
#
# Periscope serves registered resource lists over Server-Sent Events
# so the UI updates in real time instead of polling on a timer. The
# frontend has a tested
# polling-fallback path for any kind whose stream cannot be opened, so
# the bad case is graceful degradation, not a hard failure.
#
# Default: enabled for all registered kinds.
#
# Set .Values.watchStreams.kinds to one of:
#
#   ""             unset → all registered kinds enabled (default)
#   "all"          same as unset; explicit form
#   "off"          disable all SSE routes; UI uses polling everywhere
#   "none"         same as "off"
#   "pods,configmaps"  comma-separated subset of per-kind tokens
#   "workloads"    group alias — every kind in the workloads group
#   "core,config"  multiple groups, one token each
#
# Per-kind tokens (current registry): pods, events, configmaps,
# resourcequotas, limitranges, serviceaccounts, deployments,
# statefulsets, daemonsets, replicasets, jobs, cronjobs,
# horizontalpodautoscalers, poddisruptionbudgets, services,
# ingresses, networkpolicies, endpointslices, ingressclasses,
# pvs, pvcs, storageclasses, nodes, namespaces, priorityclasses,
# runtimeclasses.
# Group aliases (current registry):
#   core       = pods, events
#   config     = configmaps, resourcequotas, limitranges,
#                serviceaccounts
#   workloads  = deployments, statefulsets, daemonsets, replicasets,
#                jobs, cronjobs, horizontalpodautoscalers,
#                poddisruptionbudgets
#   networking = services, ingresses, networkpolicies, endpointslices,
#                ingressclasses
#   storage    = pvs, pvcs, storageclasses
#   cluster    = nodes, namespaces, priorityclasses, runtimeclasses
#
# Reasons to opt out: an HTTP proxy / load balancer in front of
# Periscope that buffers responses or kills idle connections under
# ~30s, which can break SSE in ways the in-browser fallback can't
# always paper over. Most Ingress controllers are fine; some
# corporate-proxy setups are not.
#
# Per-user concurrent stream cap (separate concern):
#   .Values.watchStreams.perUserLimit → PERISCOPE_WATCH_PER_USER_LIMIT
#   Default 60 covers ~10 tabs × 6 list views per user. Set to 0 to
#   disable the cap entirely (not recommended).
# -----------------------------------------------------------------------------
watchStreams:
  # Empty / "all" / "off" / "none" / per-kind tokens / group aliases.
  # Leave empty to inherit the server default ("all on").
  kinds: ""
  perUserLimit: 60

# -----------------------------------------------------------------------------
# Pod Disruption Budget
#
# v1 is single-replica (in-memory session store) so a node drain takes
# Periscope down. The default PDB still gets rendered to make that intent
# explicit in cluster audit. Disable if you do not want a PDB at all.
# -----------------------------------------------------------------------------
pdb:
  enabled: true
  # maxUnavailable=1 means a drain can evict the single replica without
  # blocking. When HA lands in v1.x, switch to minAvailable per replicaCount.
  maxUnavailable: 1

# -----------------------------------------------------------------------------
# NetworkPolicy
#
# Off by default — every cluster has different ingress controller plumbing
# and IdP egress targets. See docs/setup/networkpolicy.md for the recipe.
# When enabled, the rendered policy denies all ingress except from the
# namespaces you list, and denies all egress except DNS + the extra rules
# you supply (typically the IdP host and EKS endpoints).
# -----------------------------------------------------------------------------
networkPolicy:
  enabled: false
  ingress:
    # namespaceSelector matchLabels for ingress sources. Example:
    #   - kubernetes.io/metadata.name: ingress-nginx
    fromNamespaces: []
    # Raw NetworkPolicyIngressRule entries appended to the rule set.
    extra: []
  egress:
    # Raw NetworkPolicyEgressRule entries (e.g. IdP CIDRs, EKS endpoints,
    # AWS STS). DNS to kube-dns is always added.
    extra: []

# -----------------------------------------------------------------------------
# Per-cluster RBAC manifests (tier mode)
#
# When authorization.mode=tier, you apply a small set of RBAC manifests
# to EACH managed cluster (the chart renders them when clusterRBAC.enabled=true).
# These bind the periscope-tier:* groups to standard ClusterRoles and grant
# Periscope's pod principal the impersonate verb.
#
# Render and apply per cluster:
#   helm template periscope ./deploy/helm/periscope --values my-values.yaml \
#     --show-only templates/cluster-rbac.yaml \
#     | kubectl --context <managed-cluster> apply -f -
# -----------------------------------------------------------------------------
clusterRBAC:
  enabled: false

  # The K8s group your EKS Access Entry binds Periscope's pod
  # principal to on each managed cluster. The chart-rendered
  # ClusterRoleBinding for periscope-impersonator references this name.
  bridgeGroup: periscope-bridge

# -----------------------------------------------------------------------------
# Agent backend (#42) — per-cluster periscope-agent that dials out to
# the central server over a long-lived WebSocket. Enabling this:
#   - Opens a dedicated TLS listener on `agent.listenAddr` (separate
#     from the main HTTP port; serves /api/agents/connect with mTLS).
#   - Mounts /api/agents/tokens (admin-only) and /api/agents/register
#     on the main router.
#   - Pre-creates an empty Secret for the per-deployment CA, plus
#     RBAC granting the server SA get/update on it.
#
# Leave disabled if you don't yet have managed clusters running an
# agent. Existing eks/kubeconfig/in-cluster backends keep working
# regardless.
# -----------------------------------------------------------------------------
agent:
  enabled: false

  # The server's bind address for the dedicated TLS listener. Default
  # ":8443". Operators expose this externally via:
  #   - a second Service of type LoadBalancer (NLB recommended,
  #     TLS-passthrough since mTLS terminates at the pod), or
  #   - a separate Ingress with TLS passthrough, or
  #   - kubectl port-forward for local testing.
  listenAddr: ":8443"

  # SAN(s) baked into the server cert agents present on the tunnel.
  # Agents validate the server's cert against the CA they got at
  # registration; the SAN must match whatever DNS name the agent
  # connects to. Comma-separated.
  #   localhost              kind / port-forward smoke testing
  #   agents.example.com     production with NLB + Route53 record
  tunnelSANs: "localhost"

  # K8s Secret that holds the per-deployment CA. The chart pre-creates
  # this empty; the server fills it on first boot via Update.
  caSecretName: "periscope-agent-ca"

  # Optional second Service for exposing the tunnel listener
  # externally. Default disabled — operators wire their own NLB or
  # use kubectl port-forward for first-cluster testing.
  tunnelService:
    enabled: false
    type: LoadBalancer
    port: 8443
    annotations: {}
