apiVersion: v2
name: periscope
description: |
  Periscope — a keyless-auth EKS dashboard. OIDC login (Auth0 / Okta /
  any compliant IdP) + Pod Identity / IRSA for AWS access. No long-lived
  AWS credentials in the pod, no kubeconfigs with embedded creds on the
  laptop.
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - kubernetes
  - eks
  - dashboard
  - oidc
  - irsa
  - pod-identity
home: https://github.com/gnana997/periscope
sources:
  - https://github.com/gnana997/periscope
maintainers:
  - name: gnana997
annotations:
  # Artifact Hub renders these in the chart's listing page. See
  # https://artifacthub.io/docs/topics/annotations/helm/ for the
  # full list of recognized annotation keys.
  artifacthub.io/license: Apache-2.0
  artifacthub.io/operator: "false"
  artifacthub.io/links: |
    - name: Setup guide
      url: https://github.com/gnana997/periscope/blob/main/docs/setup/deploy.md
    - name: Documentation
      url: https://periscopehq.dev/docs
    - name: Source code
      url: https://github.com/gnana997/periscope
    - name: Changelog
      url: https://periscopehq.dev/changelog
    - name: Companion — agent chart (multi-cluster)
      url: https://artifacthub.io/packages/helm/periscope/periscope-agent
    - name: Issues
      url: https://github.com/gnana997/periscope/issues
  # The release.yaml workflow updates this annotation on every tag
  # to reflect the PR titles since the previous tag (high-signal
  # release notes for Artifact Hub's "What changed" panel).
  artifacthub.io/changes: |
    - kind: added
      description: "Apply YAML dialog — paste / upload multi-doc YAML with dry-run, server-side apply, per-doc RBAC pre-flight, audit per doc"
    - kind: added
      description: "EKS Upgrade Insights viewer with deep links from affected resources to the YAML editor"
    - kind: added
      description: "EKS managed node groups view with current AMI release version and days-behind-latest drift detection (SSM primary, EC2 DescribeImages fallback)"
    - kind: added
      description: "Workload rollback for Deployment / StatefulSet / DaemonSet with revision diff preview and GitOps / paused / HPA pre-flight warnings"
    - kind: added
      description: "SSE watch streams extended to ConfigMaps, ResourceQuotas, LimitRanges, ServiceAccounts"
    - kind: changed
      description: "AWS SDK errors mapped to meaningful HTTP statuses (403/404/429) and stable codes (E_AWS_FORBIDDEN, E_AWS_NOT_FOUND, E_AWS_THROTTLED) instead of collapsing every error to 502"
    - kind: fixed
      description: "NamespacePicker dropdown no longer clipped at the viewport edge or painted over by the FilterStrip; gained a search input and a taller responsive panel"
  # Cosign signing — Artifact Hub will display a "Signed" badge when
  # the chart is verifiable via cosign. The signKey block teaches it
  # how to verify; for keyless (Sigstore) signatures the URL points
  # at the GH OIDC issuer.
  artifacthub.io/signKey: |
    fingerprint: keyless
    url: https://token.actions.githubusercontent.com
